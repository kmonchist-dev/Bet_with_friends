<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 Bets — Leaderboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="betting.html">⚽ WC2026</a>
  <a href="betting.html"><span>Fixtures</span> 📅</a>
  <a href="mybets.html"><span>My Bets</span> 🎟️</a>
  <a href="leaderboard.html" class="active"><span>Board</span> 🏆</a>
  <span class="nav-balance" id="navBalance">€—</span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🏆 Leaderboard</h1>
    <p>Updated live. Who's got the best instincts?</p>
  </div>

  <div class="card" id="lbContainer">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<script src="js/data.js"></script>
<script type="module">
import { getOrCreateUser, getLeaderboard } from "./js/firebase.js";

const stored = sessionStorage.getItem("wc_user");
if (!stored) { window.location.href = "index.html"; }
const currentUser = JSON.parse(stored);

async function init() {
  const user = await getOrCreateUser(currentUser.id);
  document.getElementById("navBalance").textContent = `€${user.balance.toFixed(0)}`;

  const players = await getLeaderboard();
  const container = document.getElementById("lbContainer");

  if (!players.length) {
    container.innerHTML = `<div class="empty-state">No players yet.</div>`;
    return;
  }

  const medals = ["🥇","🥈","🥉"];

  container.innerHTML = players.map((p, i) => {
    const isMe = p.id === currentUser.id;
    const rank = i + 1;
    const rankLabel = medals[i] || rank;
    return `
      <div class="lb-row" style="${isMe ? "background:rgba(201,162,39,0.05);border-radius:8px;padding:14px 10px;" : ""}">
        <div class="lb-rank ${rank <= 3 ? "top" : ""}">${rankLabel}</div>
        <div class="lb-name">
          ${p.displayName || p.id}
          ${isMe ? `<span style="font-size:0.72rem;color:var(--accent);margin-left:6px">(you)</span>` : ""}
        </div>
        <div class="lb-balance">€${(p.balance || 0).toFixed(0)}</div>
      </div>
    `;
  }).join("");
}

await init();
</script>

</body>
</html>
