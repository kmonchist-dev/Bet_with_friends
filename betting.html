<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 Bets — Fixtures</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Player picker grid ── */
    .player-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .player-col-header {
      background: var(--surface);
      padding: 7px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .player-col-header:first-child { border-right: 1px solid var(--border); }
    .player-col {
      max-height: 200px;
      overflow-y: auto;
    }
    .player-col:first-child { border-right: 1px solid var(--border); }
    .player-name {
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(42,53,80,0.5);
      transition: background 0.1s;
      color: var(--text);
    }
    .player-name:last-child { border-bottom: none; }
    .player-name:hover   { background: var(--card); color: var(--accent2); }
    .player-name.selected { background: rgba(201,162,39,0.12); color: var(--accent); font-weight: 700; }
    .no-goal-btn {
      grid-column: 1 / -1;
      padding: 8px;
      text-align: center;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.1s;
    }
    .no-goal-btn:hover   { background: var(--card); color: var(--text); }
    .no-goal-btn.selected { background: rgba(201,162,39,0.1); color: var(--accent); font-weight: 700; }

    /* ── Expected gains in slip ── */
    .slip-gains {
      font-size: 0.8rem;
      color: var(--green);
      font-weight: 700;
      margin-top: 2px;
      min-height: 16px;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="betting.html">⚽ WC2026</a>
  <a href="betting.html" class="active"><span>Fixtures</span> 📅</a>
  <a href="mybets.html"><span>My Bets</span> 🎟️</a>
  <a href="leaderboard.html"><span>Board</span> 🏆</a>
  <span class="nav-balance" id="navBalance">€—</span>
</nav>

<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="page-header">
    <h1>Fixtures</h1>
    <p>Click a match to expand markets. Betting closes when a match is locked.</p>
  </div>

  <div class="group-pills" id="groupPills">
    <div class="pill active" data-group="all">All</div>
    <div class="pill" data-group="open">Open</div>
    <div class="pill" data-group="settled">Settled</div>
    <div class="pill" data-group="A">A</div>
    <div class="pill" data-group="B">B</div>
    <div class="pill" data-group="C">C</div>
    <div class="pill" data-group="D">D</div>
    <div class="pill" data-group="E">E</div>
    <div class="pill" data-group="F">F</div>
    <div class="pill" data-group="G">G</div>
    <div class="pill" data-group="H">H</div>
    <div class="pill" data-group="I">I</div>
    <div class="pill" data-group="J">J</div>
    <div class="pill" data-group="K">K</div>
    <div class="pill" data-group="L">L</div>
  </div>

  <div id="fixturesList"></div>
</div>

<!-- BET SLIP -->
<div class="bet-slip" id="betSlip">
  <div class="bet-slip-info">
    <strong id="slipLabel">—</strong>
    <span id="slipSub">—</span>
    <div class="slip-gains" id="slipGains"></div>
  </div>
  <div class="bet-amount-wrap">
    <span style="color:var(--muted);font-size:0.85rem">€</span>
    <input type="number" class="bet-amount-input" id="betAmount" value="10" min="1" max="99999">
    <button class="btn btn-primary" id="placeBetBtn">Bet</button>
    <button class="btn btn-secondary btn-sm" id="cancelBetBtn">✕</button>
  </div>
</div>

<script src="js/data.js"></script>
<script type="module">
import { getOrCreateUser, checkDailyBonus, placeBet, getMatchResult, getMatchMarketBets }
  from "./js/firebase.js";

// ── Auth guard ───────────────────────────────────────────────
const stored = sessionStorage.getItem("wc_user");
if (!stored) { window.location.href = "index.html"; }
const currentUser = JSON.parse(stored);

let userBalance = 0;
async function refreshBalance() {
  const user = await getOrCreateUser(currentUser.id);
  userBalance = user.balance;
  document.getElementById("navBalance").textContent = `€${userBalance.toFixed(0)}`;
}

// ── Bonus toast ──────────────────────────────────────────────
const bonusData = sessionStorage.getItem("wc_bonus");
if (bonusData) {
  const b = JSON.parse(bonusData);
  sessionStorage.removeItem("wc_bonus");
  setTimeout(() => toast(`🎁 Daily bonus +€${b.amount} credited!`, "success"), 800);
}

// ── State ────────────────────────────────────────────────────
let selectedPick  = null;   // { matchId, marketId, pick, label, type, multiplier, poolData }
let activeGroup   = "all";
let openMatchId   = null;
let poolOddsCache = {};

// ── Render fixtures ──────────────────────────────────────────
function renderFixtures() {
  const list = document.getElementById("fixturesList");
  list.innerHTML = "";

  let fixtures = WC2026.fixtures;
  if      (activeGroup === "open")    fixtures = fixtures.filter(f => f.status === "upcoming" || f.status === "live");
  else if (activeGroup === "settled") fixtures = fixtures.filter(f => f.status === "settled");
  else if (activeGroup !== "all")     fixtures = fixtures.filter(f => f.group === activeGroup);

  if (!fixtures.length) {
    list.innerHTML = `<div class="empty-state">No fixtures found.</div>`;
    return;
  }

  fixtures.forEach(f => {
    const home   = WC2026.teams[f.home];
    const away   = WC2026.teams[f.away];
    const locked = f.status === "locked" || f.status === "settled";

    const card = document.createElement("div");
    card.className = `match-card${locked ? " settled" : ""}`;
    card.id = `match-${f.id}`;

    card.innerHTML = `
      <div class="match-header" data-match-id="${f.id}" style="cursor:${locked ? "default" : "pointer"}">
        <div class="match-teams">
          <div class="match-team">
            <span class="match-flag">${home.flag}</span>
            <span class="match-team-name">${home.name}</span>
          </div>
          <div class="match-vs">
            ${f.status === "settled"
              ? `<div class="match-score" id="score-${f.id}">…</div>`
              : `<div style="font-size:0.75rem">VS</div>`}
          </div>
          <div class="match-team away">
            <span class="match-flag">${away.flag}</span>
            <span class="match-team-name">${away.name}</span>
          </div>
        </div>
        <div class="match-meta">
          <span class="badge badge-group">Group ${f.group}</span>
          <span class="badge badge-${f.status}">${statusLabel(f.status)}</span>
          <span>📅 ${formatDate(f.date, f.time)}</span>
          <span>📍 ${f.venue.split(",")[0]}</span>
          ${locked ? "" : `<span style="margin-left:auto;font-size:0.78rem;color:var(--accent2)" id="toggle-hint-${f.id}">Tap to bet ▾</span>`}
        </div>
      </div>
      <div class="market-panel" id="markets-${f.id}" style="display:none;margin-top:12px"></div>
    `;

    if (!locked) {
      card.querySelector(".match-header").addEventListener("click", () => toggleMarkets(f));
    }

    list.appendChild(card);
    if (f.status === "settled") loadScore(f.id);
  });
}

async function loadScore(matchId) {
  const result = await getMatchResult(matchId);
  const el = document.getElementById(`score-${matchId}`);
  if (el && result) el.textContent = `${result.scoreHome}-${result.scoreAway}`;
  else if (el) el.textContent = "?-?";
}

// ── Toggle markets ───────────────────────────────────────────
async function toggleMarkets(fixture) {
  const panel = document.getElementById(`markets-${fixture.id}`);
  const hint  = document.getElementById(`toggle-hint-${fixture.id}`);

  if (openMatchId === fixture.id) {
    panel.style.display = "none";
    openMatchId = null;
    if (hint) hint.textContent = "Tap to bet ▾";
    return;
  }

  if (openMatchId) {
    const old     = document.getElementById(`markets-${openMatchId}`);
    const oldHint = document.getElementById(`toggle-hint-${openMatchId}`);
    if (old)     old.style.display = "none";
    if (oldHint) oldHint.textContent = "Tap to bet ▾";
  }

  openMatchId = fixture.id;
  if (hint) hint.textContent = "Tap to close ▴";
  panel.style.display = "block";
  panel.innerHTML = `<div style="padding:16px;color:var(--muted)">Loading markets…</div>`;

  await fetchPoolOdds(fixture.id);
  renderMarkets(fixture, panel);
}

async function fetchPoolOdds(matchId) {
  const poolMarkets = WC2026.marketTemplates.filter(m => m.type === "pool");
  for (const market of poolMarkets) {
    const bets     = await getMatchMarketBets(matchId, market.id);
    const totalPot = bets.reduce((s, b) => s + b.amount, 0);
    const byPick   = {};
    bets.forEach(b => { byPick[b.pick] = (byPick[b.pick] || 0) + b.amount; });
    poolOddsCache[`${matchId}-${market.id}`] = { totalPot, byPick };
  }
}

// ── Render markets ───────────────────────────────────────────
function renderMarkets(fixture, panel) {
  const home       = WC2026.teams[fixture.home];
  const away       = WC2026.teams[fixture.away];

  panel.innerHTML = "";

  for (const market of WC2026.marketTemplates) {
    const row     = document.createElement("div");
    row.className = "market-row";

    const isPool  = market.type === "pool";
    const oddsTag = isPool ? "Pool odds" : `${market.multiplier}x fixed`;

    let optionsHTML = "";

    // ── Player picker (two-column grid) ──────────────────────
    if (market.options === "player_list") {
      const homeRows = home.players.map(p =>
        `<div class="player-name" data-match-id="${fixture.id}" data-market-id="${market.id}"
              data-pick="${p}" data-label="${market.label}: ${p}">${p}</div>`
      ).join("");
      const awayRows = away.players.map(p =>
        `<div class="player-name" data-match-id="${fixture.id}" data-market-id="${market.id}"
              data-pick="${p}" data-label="${market.label}: ${p}">${p}</div>`
      ).join("");

      optionsHTML = `
        <div class="player-picker">
          <div class="player-col-header">${home.flag} ${home.name}</div>
          <div class="player-col-header">${away.flag} ${away.name}</div>
          <div class="player-col">${homeRows}</div>
          <div class="player-col">${awayRows}</div>
          <div class="no-goal-btn"
               data-match-id="${fixture.id}" data-market-id="${market.id}"
               data-pick="No Goal" data-label="${market.label}: No Goal">
            ⚽ No Goal
          </div>
        </div>`;

    // ── Exact score ──────────────────────────────────────────
    } else if (market.options === "free_score") {
      optionsHTML = `
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="number" min="0" max="20" placeholder="0" id="sh-${fixture.id}"
            style="width:60px;background:var(--card);border:1px solid var(--border);border-radius:7px;
                   color:var(--text);padding:8px;text-align:center;font-size:1.1rem;font-weight:700;outline:none">
          <span style="color:var(--muted);font-weight:700">—</span>
          <input type="number" min="0" max="20" placeholder="0" id="sa-${fixture.id}"
            style="width:60px;background:var(--card);border:1px solid var(--border);border-radius:7px;
                   color:var(--text);padding:8px;text-align:center;font-size:1.1rem;font-weight:700;outline:none">
          <button class="btn btn-secondary btn-sm" id="score-pick-${fixture.id}-${market.id}">
            Confirm Score
          </button>
        </div>`;

    // ── Standard options ─────────────────────────────────────
    } else {
      optionsHTML = (market.options || []).map(opt => {
        const label = (market.optionLabels?.[opt] || opt)
          .replace("{home}", home.name)
          .replace("{away}", away.name);

        let oddsDisplay = "";
        if (isPool) {
          const cache = poolOddsCache[`${fixture.id}-${market.id}`] || {};
          const total = cache.totalPot || 0;
          const stake = cache.byPick?.[opt] || 0;
          oddsDisplay = total > 0 && stake > 0
            ? `<span class="market-option-odds">~${(total / stake).toFixed(1)}x</span>`
            : `<span class="market-option-odds">Pool</span>`;
        } else {
          oddsDisplay = `<span class="market-option-odds">${market.multiplier}x</span>`;
        }

        return `
          <div class="market-option"
               data-match-id="${fixture.id}"
               data-market-id="${market.id}"
               data-pick="${opt}"
               data-label="${label}">
            <span class="market-option-name">${label}</span>
            ${oddsDisplay}
          </div>`;
      }).join("");
    }

    row.innerHTML = `
      <div class="market-label">
        ${market.label}
        <span class="market-odds-tag">${oddsTag}</span>
      </div>
      <div class="market-options">${optionsHTML}</div>
    `;
    panel.appendChild(row);

    // Score confirm button
    if (market.options === "free_score") {
      const btn = document.getElementById(`score-pick-${fixture.id}-${market.id}`);
      btn?.addEventListener("click", e => {
        e.stopPropagation();
        const sh = parseInt(document.getElementById(`sh-${fixture.id}`)?.value ?? "");
        const sa = parseInt(document.getElementById(`sa-${fixture.id}`)?.value ?? "");
        if (isNaN(sh) || isNaN(sa)) { toast("Enter both scores first", "error"); return; }

        // Pool data for expected gains
        const cache    = poolOddsCache[`${fixture.id}-${market.id}`] || {};
        const poolData = { totalPot: cache.totalPot || 0, myStake: cache.byPick?.[`${sh}-${sa}`] || 0, type: "pool" };
        selectPick(fixture.id, market.id, `${sh}-${sa}`,
          `Exact Score: ${home.name} ${sh}-${sa} ${away.name}`, poolData);
      });
      document.getElementById(`sh-${fixture.id}`)?.addEventListener("click", e => e.stopPropagation());
      document.getElementById(`sa-${fixture.id}`)?.addEventListener("click", e => e.stopPropagation());
    }
  }

  // ── Delegated click on whole panel ───────────────────────
  panel.addEventListener("click", e => {
    e.stopPropagation();

    // Standard market options
    const option = e.target.closest(".market-option[data-pick]");
    if (option) {
      const mid    = option.dataset.marketId;
      const market = WC2026.marketTemplates.find(m => m.id === mid);
      const isPool = market?.type === "pool";
      let poolData = null;
      if (isPool) {
        const cache  = poolOddsCache[`${fixture.id}-${mid}`] || {};
        poolData = { totalPot: cache.totalPot || 0, myStake: cache.byPick?.[option.dataset.pick] || 0, type: "pool" };
      } else {
        poolData = { type: "fixed", multiplier: market?.multiplier || 1 };
      }
      selectPick(option.dataset.matchId, mid, option.dataset.pick, option.dataset.label, poolData);
      return;
    }

    // Player name pick
    const pname = e.target.closest(".player-name[data-pick], .no-goal-btn[data-pick]");
    if (pname) {
      const mid    = pname.dataset.marketId;
      const market = WC2026.marketTemplates.find(m => m.id === mid);
      selectPick(pname.dataset.matchId, mid, pname.dataset.pick, pname.dataset.label,
        { type: "fixed", multiplier: market?.multiplier || 1 });
      return;
    }
  });
}

// ── Pick selection ───────────────────────────────────────────
function selectPick(matchId, marketId, pick, label, oddsData) {
  // Clear all highlights
  document.querySelectorAll(".market-option.selected, .player-name.selected, .no-goal-btn.selected")
    .forEach(e => e.classList.remove("selected"));

  // Highlight selected
  const sel = document.querySelector(
    `[data-match-id="${matchId}"][data-market-id="${marketId}"][data-pick="${pick}"]`
  );
  if (sel) sel.classList.add("selected");

  const fixture = WC2026.fixtures.find(f => f.id === matchId);
  const market  = WC2026.marketTemplates.find(m => m.id === marketId);
  const home    = WC2026.teams[fixture.home];
  const away    = WC2026.teams[fixture.away];

  selectedPick = { matchId, marketId, pick, label, oddsData };

  document.getElementById("slipLabel").textContent = label;
  document.getElementById("slipSub").textContent =
    `${home.flag} ${home.name} vs ${away.flag} ${away.name} · ${market?.label}`;

  updateGains();
  document.getElementById("betSlip").classList.add("visible");
}

// ── Expected gains ───────────────────────────────────────────
function updateGains() {
  if (!selectedPick) return;
  const amount = parseFloat(document.getElementById("betAmount").value) || 0;
  const gains  = document.getElementById("slipGains");
  if (amount < 1) { gains.textContent = ""; return; }

  const od = selectedPick.oddsData;
  if (!od) { gains.textContent = ""; return; }

  if (od.type === "fixed") {
    const win = (amount * od.multiplier).toFixed(2);
    gains.textContent = `→ Win: €${win} (×${od.multiplier})`;

  } else if (od.type === "pool") {
    // Simulate adding this bet to the pool
    const newTotal = od.totalPot + amount;
    const newStake = od.myStake + amount;
    const est      = newStake > 0 ? (newTotal / newStake) * amount : 0;
    const odds     = newStake > 0 ? (newTotal / newStake).toFixed(1) : "?";
    gains.textContent = `→ Est. win: €${est.toFixed(2)} (~${odds}x) · Pool odds shift as others bet`;
  }
}

document.getElementById("betAmount").addEventListener("input", updateGains);

// ── Place bet ────────────────────────────────────────────────
document.getElementById("placeBetBtn").addEventListener("click", async () => {
  if (!selectedPick) { toast("Select a pick first", "error"); return; }

  const amount = parseFloat(document.getElementById("betAmount").value);
  if (isNaN(amount) || amount < 1) { toast("Minimum bet is €1", "error"); return; }
  if (amount > userBalance)        { toast("Insufficient balance!", "error"); return; }

  const btn = document.getElementById("placeBetBtn");
  btn.disabled    = true;
  btn.textContent = "…";

  try {
    await placeBet({
      userId:   currentUser.id,
      matchId:  selectedPick.matchId,
      marketId: selectedPick.marketId,
      pick:     selectedPick.pick,
      amount
    });
    toast(`✅ Bet placed — €${amount} on "${selectedPick.label}"`, "success");
    const prevMatchId = selectedPick.matchId;
    cancelBet();
    await refreshBalance();
    await fetchPoolOdds(prevMatchId);
  } catch (e) {
    toast(e.message, "error");
  } finally {
    btn.disabled    = false;
    btn.textContent = "Bet";
  }
});

document.getElementById("cancelBetBtn").addEventListener("click", cancelBet);
function cancelBet() {
  selectedPick = null;
  document.querySelectorAll(".market-option.selected, .player-name.selected, .no-goal-btn.selected")
    .forEach(e => e.classList.remove("selected"));
  document.getElementById("betSlip").classList.remove("visible");
  document.getElementById("slipGains").textContent = "";
}

// ── Group filter ─────────────────────────────────────────────
document.getElementById("groupPills").addEventListener("click", e => {
  const pill = e.target.closest(".pill");
  if (!pill) return;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  pill.classList.add("active");
  activeGroup = pill.dataset.group;
  openMatchId = null;
  cancelBet();
  renderFixtures();
});

// ── Helpers ──────────────────────────────────────────────────
function statusLabel(s) {
  return { upcoming:"Open", locked:"Locked", live:"LIVE", settled:"Settled" }[s] || s;
}
function formatDate(date, time) {
  try {
    const dt = new Date(`${date}T${time}:00`);
    return dt.toLocaleDateString("en-GB", { day:"numeric", month:"short" }) + " " + time;
  } catch { return `${date} ${time}`; }
}
function toast(msg, type = "info") {
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className   = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ── Init ─────────────────────────────────────────────────────
await refreshBalance();
renderFixtures();
</script>

</body>
</html>
